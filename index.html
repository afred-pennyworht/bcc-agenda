<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BCC2026 — Agenda Preview</title>
  <style>
    body { margin: 0; padding: 20px; background: #111; color: #eee; font-family: sans-serif; }
    .lang-switch { text-align: center; margin-bottom: 20px; }
    .lang-switch a { color: #f7931a; margin: 0 10px; text-decoration: none; font-weight: bold; cursor: pointer; }
    .lang-switch a:hover { text-decoration: underline; }
    .lang-switch a.active { border-bottom: 2px solid #f7931a; }
    h1 { text-align: center; color: #f7931a; }
    #bcc-agenda { background: #fff; border-radius: 12px; padding: 24px; margin: 0 auto; max-width: 1150px; }
  </style>
</head>
<body>
  <h1>BCC2026 — Agenda Preview</h1>
  <div class="lang-switch">
    <a onclick="loadLang('en')" id="lang-en">EN</a>
    <a onclick="loadLang('es')" id="lang-es" class="active">ES</a>
    <a onclick="loadLang('ca')" id="lang-ca">CA</a>
  </div>
  <div id="bcc-agenda" data-lang="es"></div>
  <script src="widget/widget.js"></script>
  <script>
    // Preview-only: manual language switching (overrides widget auto-detect)
    function loadLang(lang) {
      document.querySelectorAll('.lang-switch a').forEach(a => a.classList.remove('active'));
      document.getElementById('lang-' + lang).classList.add('active');
      fetch('data/agenda_' + lang + '.json')
        .then(r => r.json())
        .then(data => {
          // Re-use the widget's internal render if exposed, otherwise rebuild
          const container = document.getElementById('bcc-agenda');
          if (container && window.__bccRender) {
            window.__bccRender(data);
          } else {
            // Fallback: reload page with lang hint
            location.search = '?lang=' + lang;
          }
        });
    }
  </script>
</body>
</html>
