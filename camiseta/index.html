<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>BCC2026 — Camiseta</title>

  <!--
    ============================================================
    REDIRECT ESTABLE  →  Stripe Payment Link de la camiseta
    ------------------------------------------------------------
    Para actualizar el destino (p.ej. si cambia el precio y Stripe
    genera otro Payment Link), edita SOLO la línea STRIPE_URL de
    abajo y haz push. El QR impreso NO cambia: apunta a esta página.
    ============================================================
  -->
  <script>
    // 👇 VALOR PRINCIPAL a editar para cambiar el destino del QR:
    var STRIPE_URL = "https://buy.stripe.com/dRm6oA4kAh0XeN03bCgjC00";
    // Redirección inmediata por JS (no deja entrada en el historial).
    window.location.replace(STRIPE_URL);
    // Rellena el botón de fallback desde el mismo valor (1 sitio menos que tocar).
    document.addEventListener("DOMContentLoaded", function () {
      var b = document.getElementById("buy"); if (b) b.href = STRIPE_URL;
    });
  </script>

  <!-- Fallback SIN JavaScript. ⚠️ Mantener esta URL idéntica a STRIPE_URL de arriba. -->
  <meta http-equiv="refresh" content="0; url=https://buy.stripe.com/dRm6oA4kAh0XeN03bCgjC00">

  <style>
    body { margin:0; height:100vh; display:flex; align-items:center; justify-content:center;
           background:#1a1a2e; color:#eee; font-family:system-ui,sans-serif; text-align:center; }
    .card { padding:32px; }
    img { width:96px; height:auto; margin-bottom:20px; }
    h1 { font-size:1.2rem; font-weight:600; margin:0 0 8px; }
    p  { color:#aaa; margin:0 0 20px; font-size:.95rem; }
    a.btn { display:inline-block; background:#f7931a; color:#1a1a2e; text-decoration:none;
            font-weight:700; padding:12px 22px; border-radius:8px; }
  </style>
</head>
<body>
  <div class="card">
    <img src="../assets/pictures/logo_bcc_icon.png" alt="BCC2026">
    <h1>Redirigiendo a la tienda… / Redirecting to the shop…</h1>
    <p>Si no avanza automáticamente, pulsa el botón. / If it doesn't continue automatically, tap the button.</p>
    <a class="btn" id="buy" href="https://buy.stripe.com/dRm6oA4kAh0XeN03bCgjC00">Comprar camiseta / Buy t-shirt</a>
  </div>
</body>
</html>
